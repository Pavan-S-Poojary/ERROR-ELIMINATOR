<!DOCTYPE html>
<html>
<head>
<title>TECH YUVA – ERROR ELIMINATOR</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Orbitron',sans-serif;
background:black;
color:white;
text-align:center;
overflow-x:hidden;
}

/* CYBER GRID */

.grid{
position:fixed;
width:100%;
height:100%;
background:
linear-gradient(#00ffff22 1px, transparent 1px),
linear-gradient(90deg,#00ffff22 1px, transparent 1px);
background-size:40px 40px;
animation:gridMove 8s linear infinite;
z-index:-3;
}

@keyframes gridMove{
0%{transform:translateY(0);}
100%{transform:translateY(40px);}
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-2;
}

.mainTitle{
font-size:60px;
margin-top:30px;
letter-spacing:8px;
color:#00ffff;
text-shadow:0 0 20px #00ffff,0 0 40px #00ffff;
}

.subTitle{
font-size:30px;
margin-top:5px;
letter-spacing:5px;
color:#00ffcc;
text-shadow:0 0 15px #00ffcc;
}

.container{
background:rgba(255,255,255,0.05);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,0.15);
padding:40px;
border-radius:25px;
width:90%;
max-width:520px;
margin:40px auto;
box-shadow:0 0 35px #00ffff;
}

button{
width:320px;
padding:18px;
margin:12px;
font-size:16px;
border:none;
border-radius:14px;
background:linear-gradient(145deg,#00ffff,#0072ff);
color:white;
cursor:pointer;
box-shadow:0 6px 0 #003a7a,0 0 20px #00ffff;
transition:all 0.25s ease;
}

button:hover{
transform:translateY(-4px) scale(1.05);
box-shadow:0 12px 25px #00ffff,0 0 45px #00ffff;
}

.exitBtn{
background:linear-gradient(145deg,#ff0000,#a30000);
}

#timer{
font-size:28px;
margin-top:20px;
color:#00ffff;
}

.flash{
animation:flash 1s infinite;
color:red;
}

@keyframes flash{
0%{opacity:1;}
50%{opacity:0.4;}
100%{opacity:1;}
}

.progress{
width:80%;
height:10px;
background:#111;
margin:12px auto;
border-radius:10px;
overflow:hidden;
}

.bar{
height:100%;
width:100%;
background:#00ffff;
}

iframe{
margin-top:20px;
border:none;
width:100%;
height:850px;
display:none;
}

#judgePanel{
display:none;
margin:40px auto;
padding:30px;
border-radius:18px;
background:rgba(0,255,255,0.08);
border:1px solid #00ffff;
color:#00ffff;
font-size:22px;
text-shadow:0 0 12px #00ffff;
width:90%;
max-width:420px;
box-shadow:0 0 25px #00ffff;
}

.footer{
margin-top:30px;
padding:15px;
border-top:1px solid #00ffff;
color:#aaa;
}

</style>

<script>

let timer=null;
let fullscreenMonitor=null;
let warnings=0;
let maxWarnings=3;

let totalTime=1800;
let timeLeft=totalTime;

/* TIMER */

function startTimer(){

timer=setInterval(function(){

timeLeft--;

let m=Math.floor(timeLeft/60);
let s=timeLeft%60;

document.getElementById("timer").innerHTML="⏳ "+m+"m "+s+"s";

let percent=(timeLeft/totalTime)*100;
document.getElementById("bar").style.width=percent+"%";

if(timeLeft<=120){
document.getElementById("timer").classList.add("flash");
}

if(timeLeft<=0){

clearInterval(timer);

document.getElementById("timer").innerHTML="⏰ TIME OVER";

alert("Time is over. Submit the form and click EXIT.");

}

},1000);

}

/* START EXAM */

function startExam(link,setName){

document.documentElement.requestFullscreen();

localStorage.setItem("startTime",Date.now());
localStorage.setItem("setName",setName);

document.getElementById("menu").style.display="none";
document.getElementById("examFrame").style.display="block";
document.getElementById("examFrame").src=link;

timeLeft=totalTime;

startTimer();

/* FULLSCREEN MONITOR */

fullscreenMonitor=setInterval(function(){

if(!document.fullscreenElement){

alert("Fullscreen exited. Exam terminated.");

finishExam();

}

},1000);

}

/* TAB SWITCH DETECTION */

document.addEventListener("visibilitychange",function(){

if(document.hidden){

warnings++;

alert("Tab switching detected! Warning "+warnings+"/3");

if(warnings>=maxWarnings){

alert("Too many violations. Exam terminated.");

finishExam();

}

}

});

/* DEVTOOLS BLOCK */

document.onkeydown=function(e){

if(e.key==="F12") return false;

if(e.ctrlKey && e.shiftKey && e.key==="I") return false;

if(e.ctrlKey && e.key==="u") return false;

};

/* COPY BLOCK */

document.addEventListener("copy",e=>e.preventDefault());

/* RIGHT CLICK BLOCK */

document.addEventListener("contextmenu",e=>e.preventDefault());

/* FINISH EXAM */

function finishExam(){

clearInterval(timer);
clearInterval(fullscreenMonitor);

document.getElementById("examFrame").src="";
document.getElementById("examFrame").style.display="none";

let start=localStorage.getItem("startTime");
let setName=localStorage.getItem("setName");

let total=Math.floor((Date.now()-start)/1000);

let minutes=Math.floor(total/60);
let seconds=total%60;

document.getElementById("judgePanel").style.display="block";

document.getElementById("judgeSet").innerHTML="Set: "+setName;

document.getElementById("judgeTime").innerHTML=
"Time Taken: "+minutes+" minutes "+seconds+" seconds";

timeLeft=totalTime;
warnings=0;

document.getElementById("timer").innerHTML="";
document.getElementById("bar").style.width="100%";

}

</script>

</head>

<body>

<div class="grid"></div>

<div class="mainTitle">TECH YUVA</div>
<div class="subTitle">ERROR ELIMINATOR</div>

<div class="container" id="menu">

<h3>Select Question Set</h3>

<button onclick="startExam('https://forms.gle/TGmx7fRmLXAAmxJw9','C SET 1')">C SET 1</button>
<button onclick="startExam('https://forms.gle/JoRWxNeU5rLgMCpj7','C SET 2')">C SET 2</button>
<button onclick="startExam('https://forms.gle/xMRg8z3pRh4hbcxZA','C SET 3')">C SET 3</button>

<button onclick="startExam('https://forms.gle/SdAx4pXXXGxoqtRi8','PYTHON SET 1')">PYTHON SET 1</button>
<button onclick="startExam('https://forms.gle/4cuF6Z5vGWpmfsTJA','PYTHON SET 2')">PYTHON SET 2</button>
<button onclick="startExam('https://forms.gle/FdiW5KQBpfsgBNyEA','PYTHON SET 3')">PYTHON SET 3</button>

<button onclick="startExam('https://forms.gle/cxm8gjXCgaqfKcc3A','JAVA SET')">JAVA SET</button>

</div>

<div id="timer"></div>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="judgePanel">

<div style="font-size:26px;margin-bottom:10px;">
Participant Finished
</div>

<div id="judgeSet"></div>
<div id="judgeTime"></div>

<div style="color:#00ff88;margin-top:10px;">
Status: Submitted
</div>

</div>

<iframe id="examFrame"></iframe>

<div style="margin-top:20px;">
<button class="exitBtn" onclick="finishExam()">EXIT AFTER SUBMIT</button>
</div>

<div class="footer">
TECH YUVA 2026 • ERROR ELIMINATOR
</div>

</body>
</html>
